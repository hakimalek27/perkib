<!-- @dsCard group="Motif" name="Kubah (Dome)" subtitle="Mahkota dome ogee + finial — motif tunggal PERKIB" -->
<!doctype html>
<html lang="ms">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Motif Kubah — PERKIB Nadi</title>
<style>
  :root{--ivory:#F7F3EB;--obsidian:#0D1117;--gold:#C6A25D;--gold-bright:#D9BC82;--ink:#1A1F27;--muted:#4C525E;--line:#E3E5E8;
    --disp:'Bricolage Grotesque','Segoe UI',system-ui,sans-serif;--body:'Plus Jakarta Sans',system-ui,sans-serif;}
  *{box-sizing:border-box;margin:0}
  body{background:var(--ivory);color:var(--ink);font-family:var(--body);padding:32px}
  .eyebrow{display:inline-flex;align-items:center;gap:.5rem;font-size:.72rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#9E1F2E}
  .eyebrow::before{content:"";width:.5rem;height:.5rem;border-radius:2px;background:var(--gold);transform:rotate(45deg)}
  h1{font-family:var(--disp);font-weight:800;font-size:2rem;margin:.4rem 0 1.4rem}
  p.lead{color:var(--muted);max-width:44ch;margin-bottom:1.6rem}
  .row{display:flex;gap:28px;flex-wrap:wrap;align-items:flex-end}
  .demo{display:flex;flex-direction:column;align-items:center;gap:10px}
  .demo span{font-size:.72rem;color:var(--muted)}
  .kubah-halo{filter:drop-shadow(0 3px 5px rgba(198,162,93,.4))}
  .panel{margin-top:28px;background:var(--obsidian);border-radius:16px;padding:28px;display:flex;gap:28px;justify-content:center;align-items:flex-end}
  .panel span{color:#9aa1ab}
</style>
</head>
<body>
  <span class="eyebrow">Motif Tunggal</span>
  <h1>Kubah</h1>
  <p class="lead">Dome bawang (ogee) beremas dengan finial — mahkota setiap kad pegawai &amp; AJK. Digandingkan dengan bingkai arch (mihrab) menjadikan setiap kad seperti fasad masjid mini.</p>

  <div class="row">
    <div class="demo">
      <svg width="72" height="69" viewBox="0 0 48 46" fill="none" class="kubah-halo">
        <line x1="24" y1="2" x2="24" y2="8" stroke="#C6A25D" stroke-width="1.5" stroke-linecap="round"/>
        <circle cx="24" cy="2" r="1.7" fill="#C6A25D"/>
        <path d="M24 8 C29 14 31 18 28.5 22 C26.5 25.5 34 29 33 38 L15 38 C14 29 21.5 25.5 19.5 22 C17 18 19 14 24 8 Z" stroke="#C6A25D" stroke-width="1.7" stroke-linejoin="round" fill="rgba(198,162,93,.14)"/>
        <path d="M14 38 H34 M16.5 42 H31.5" stroke="#C6A25D" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <span>Emas · besar</span>
    </div>
    <div class="demo">
      <svg width="52" height="50" viewBox="0 0 48 46" fill="none" class="kubah-halo">
        <line x1="24" y1="2" x2="24" y2="8" stroke="#C6A25D" stroke-width="1.5" stroke-linecap="round"/>
        <circle cx="24" cy="2" r="1.7" fill="#C6A25D"/>
        <path d="M24 8 C29 14 31 18 28.5 22 C26.5 25.5 34 29 33 38 L15 38 C14 29 21.5 25.5 19.5 22 C17 18 19 14 24 8 Z" stroke="#C6A25D" stroke-width="1.7" stroke-linejoin="round" fill="rgba(198,162,93,.14)"/>
        <path d="M14 38 H34 M16.5 42 H31.5" stroke="#C6A25D" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <span>Emas · kecil</span>
    </div>
  </div>

  <div class="panel">
    <div class="demo">
      <svg width="72" height="69" viewBox="0 0 48 46" fill="none" class="kubah-halo">
        <line x1="24" y1="2" x2="24" y2="8" stroke="#D9BC82" stroke-width="1.5" stroke-linecap="round"/>
        <circle cx="24" cy="2" r="1.7" fill="#D9BC82"/>
        <path d="M24 8 C29 14 31 18 28.5 22 C26.5 25.5 34 29 33 38 L15 38 C14 29 21.5 25.5 19.5 22 C17 18 19 14 24 8 Z" stroke="#D9BC82" stroke-width="1.7" stroke-linejoin="round" fill="rgba(217,188,130,.16)"/>
        <path d="M14 38 H34 M16.5 42 H31.5" stroke="#D9BC82" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <span>Emas cerah · atas obsidian</span>
    </div>
  </div>
</body>
</html>
