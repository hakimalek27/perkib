<!-- @dsCard group="Komponen" name="Kad AJK" subtitle="Mahkota kubah + avatar bulat + jawatan (biasa & unggulan)" -->
<!doctype html>
<html lang="ms">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Kad AJK — PERKIB Nadi</title>
<style>
  :root{--ivory:#F7F3EB;--paper:#fff;--ink:#1A1F27;--maroon:#9E1F2E;--gold:#C6A25D;--gold-deep:#8F7440;--line:#E3E5E8;--muted:#4C525E;
    --disp:'Bricolage Grotesque','Segoe UI',system-ui,sans-serif;--body:'Plus Jakarta Sans',system-ui,sans-serif;}
  *{box-sizing:border-box;margin:0}
  body{background:var(--ivory);font-family:var(--body);color:var(--ink);padding:32px;display:flex;gap:22px;flex-wrap:wrap;align-items:flex-start}
  .card{width:220px;background:var(--paper);border:1px solid var(--line);border-radius:16px;padding:20px;text-align:center;box-shadow:0 1px 2px rgba(13,17,23,.04),0 4px 14px rgba(13,17,23,.06);position:relative}
  .card.feat{border-color:rgba(198,162,93,.5)}
  .card.feat::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;border-radius:2px 2px 0 0;background:linear-gradient(to right,var(--gold),#D9BC82,var(--gold))}
  .kubah{display:block;margin:0 auto -8px;position:relative;z-index:2;filter:drop-shadow(0 3px 5px rgba(198,162,93,.4))}
  .avatar{width:96px;height:96px;border-radius:999px;margin:0 auto;display:flex;align-items:center;justify-content:center;background:rgba(158,31,46,.08);box-shadow:0 0 0 2px rgba(198,162,93,.25)}
  .avatar.big{width:112px;height:112px;box-shadow:0 0 0 2px rgba(198,162,93,.6)}
  .avatar b{font-family:var(--disp);font-weight:800;font-size:1.8rem;color:rgba(158,31,46,.45)}
  .role{margin-top:16px;font-size:12px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;color:var(--gold-deep)}
  .role.big{font-size:14px}
  h3{font-family:var(--disp);font-weight:700;font-size:.9rem;margin:6px 0 2px}
  .kat{font-size:11px;color:var(--muted)}
</style>
</head>
<body>
  <div class="card feat">
    <svg class="kubah" width="28" height="27" viewBox="0 0 48 46" fill="none">
      <line x1="24" y1="2" x2="24" y2="8" stroke="#D9BC82" stroke-width="1.5" stroke-linecap="round"/><circle cx="24" cy="2" r="1.7" fill="#D9BC82"/>
      <path d="M24 8 C29 14 31 18 28.5 22 C26.5 25.5 34 29 33 38 L15 38 C14 29 21.5 25.5 19.5 22 C17 18 19 14 24 8 Z" stroke="#D9BC82" stroke-width="1.7" stroke-linejoin="round" fill="rgba(217,188,130,.16)"/>
      <path d="M14 38 H34 M16.5 42 H31.5" stroke="#D9BC82" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    <div class="avatar big"><b>MA</b></div>
    <p class="role big">Presiden</p>
    <h3>Ustaz Mohd Amin</h3>
    <p class="kat">Ketua Imam</p>
  </div>

  <div class="card">
    <svg class="kubah" width="24" height="23" viewBox="0 0 48 46" fill="none">
      <line x1="24" y1="2" x2="24" y2="8" stroke="#C6A25D" stroke-width="1.5" stroke-linecap="round"/><circle cx="24" cy="2" r="1.7" fill="#C6A25D"/>
      <path d="M24 8 C29 14 31 18 28.5 22 C26.5 25.5 34 29 33 38 L15 38 C14 29 21.5 25.5 19.5 22 C17 18 19 14 24 8 Z" stroke="#C6A25D" stroke-width="1.7" stroke-linejoin="round" fill="rgba(198,162,93,.14)"/>
      <path d="M14 38 H34 M16.5 42 H31.5" stroke="#C6A25D" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    <div class="avatar"><b>SZ</b></div>
    <p class="role">AJK Pendidikan</p>
    <h3>Shafiq Zulkhairi</h3>
    <p class="kat">Bilal</p>
  </div>
</body>
</html>
