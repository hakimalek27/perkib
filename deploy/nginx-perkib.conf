# nginx vhost — /etc/nginx/sites-available/perkib.my (symlink ke sites-enabled)
# Certbot: sudo certbot --nginx -d perkib.my -d www.perkib.my
# Header keselamatan aplikasi (CSP dll.) dihantar oleh Next (next.config.ts).

server {
    listen 80;
    server_name perkib.my www.perkib.my;
    # Certbot akan uruskan redirect 80→443.

    # Had saiz muat naik dokumen saguhati (3 fail × 5MB + overhed)
    client_max_body_size 20m;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
    }

    # HSTS (tambah selepas SSL disahkan berfungsi)
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
}
